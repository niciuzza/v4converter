<!DOCTYPE html>
<!--
  converter2v4 — LNW Shop v3 → v4 browser tool
  ⬇ UPDATE THESE when you change this file:
      VERSION: v1.0
      DATE:    2026-06-19
  Search for "@@VERSION" / "@@DATE" tags below to find both display spots.
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>converter2v4 v1.0 — LNW Shop v3 → v4</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header.app {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header.app h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header.app h1 span.tag {
    background: var(--accent);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    margin-left: 8px;
    font-weight: 500;
  }
  header.app h1 span.version {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-left: 6px;
    font-weight: 500;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
    letter-spacing: 0.3px;
    vertical-align: 2px;
  }
  header.app .subtitle {
    color: var(--muted);
    font-size: 13px;
  }
  #status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  #status[data-type="loading"] { color: var(--blue); border-color: rgba(56,189,248,0.4); }
  #status[data-type="ready"]   { color: var(--green); border-color: rgba(34,197,94,0.4); }
  #status[data-type="error"]   { color: var(--red);   border-color: rgba(239,68,68,0.4); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 24px;
    gap: 12px;
    min-height: 0;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
  }
  select, button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) { background: var(--accent2); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; }

  /* ── Content grid ─────────────────────────────────────────────────── */
  .content-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    min-height: 360px;
  }
  @media (max-width: 900px) {
    .content-grid { grid-template-columns: 1fr; }
  }
  .left-col, .right-col {
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 0;
  }
  .left-col .panel { flex: 1; min-height: 240px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .panel > header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .panel > header h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .panel > textarea {
    flex: 1;
    width: 100%;
    border: 0;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    resize: none;
    outline: none;
    white-space: pre;
    overflow: auto;
  }
  .panel > textarea::placeholder { color: var(--muted); }

  /* ── Output: 3 stacked boxes ─────────────────────────────────────── */
  .output-scroll {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 12px;
    overflow-y: auto;
    min-height: 0;
  }
  .output-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    flex: 1 1 0;
    min-height: 220px;
    overflow: hidden;
  }
  .output-box[hidden] { display: none !important; }
  .box-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .box-header h3 {
    margin: 0;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.3px;
  }
  .box-picker {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .box-picker select { flex: 1; min-width: 0; padding: 4px 8px; font-size: 12px; }
  .box-picker[hidden] { display: none !important; }
  .copy-btn {
    padding: 4px 10px;
    font-size: 12px;
    background: var(--surface);
  }
  .copy-btn.primary-action {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }
  .copy-btn.primary-action:hover:not(:disabled) { background: var(--accent2); }
  .output-box textarea {
    flex: 1;
    width: 100%;
    border: 0;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    resize: none;
    outline: none;
    white-space: pre;
    overflow: auto;
    min-height: 0;
  }
  .output-box textarea::placeholder { color: var(--muted); }

  /* ── Status / summary (left column, under input) ─────────────────── */
  #statusArea {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  #messages {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    max-height: 100px;
    overflow: auto;
  }
  #messages:empty { display: none; }
  .msg-line { padding: 1px 0; }
  .msg-info  { color: var(--muted); }
  .msg-ok    { color: var(--green); }
  .msg-warn  { color: var(--yellow); }
  .msg-error { color: var(--red); }

  #summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    flex-shrink: 0;
  }
  #summary[hidden] { display: none; }
  #summary > summary {
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    user-select: none;
    color: var(--text);
  }
  #summary > summary::-webkit-details-marker { display: none; }
  #summary > summary::marker { content: ""; }
  .summary-text { flex: 1; color: var(--green); }
  .summary-toggle {
    color: var(--muted);
    font-size: 11px;
    white-space: nowrap;
  }
  #summary[open] .summary-toggle::before { content: "▲ ซ่อน"; }
  #summary:not([open]) .summary-toggle::before { content: "▼ คลิกเพื่อดูรายละเอียด"; }
  .summary-tree {
    margin-top: 10px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    max-height: 360px;
    overflow-y: auto;
  }
  .tree-section { margin-bottom: 12px; }
  .tree-section:last-child { margin-bottom: 0; }
  .tree-label {
    font-weight: 600;
    color: var(--accent2);
    margin-bottom: 4px;
    font-size: 12px;
  }
  .tree-page {
    margin: 2px 0;
    padding-left: 4px;
  }
  .tree-page > summary {
    cursor: pointer;
    list-style: none;
    color: var(--text);
    padding: 2px 0;
    user-select: none;
  }
  .tree-page > summary::-webkit-details-marker { display: none; }
  .tree-page > summary::marker { content: ""; }
  .tree-page > summary::before {
    content: "▶ ";
    color: var(--muted);
    font-size: 10px;
    margin-right: 4px;
    display: inline-block;
    width: 12px;
  }
  .tree-page[open] > summary::before { content: "▼ "; }
  .section-list {
    margin: 4px 0 6px 24px;
    padding: 0;
    list-style-position: outside;
    list-style-type: decimal;
    color: var(--muted);
  }
  .section-list li { padding: 1px 0; }
  .sec-v3 {
    color: var(--yellow);
    font-weight: 500;
  }
  .sec-arrow { color: var(--muted); }
  .sec-kind {
    color: var(--accent2);
    font-weight: 500;
  }
  .sec-nick {
    color: var(--muted);
    font-style: italic;
  }
</style>
</head>
<body>

<header class="app">
  <div>
    <!-- @@VERSION + @@DATE: update both when bumping -->
    <h1>converter2v4 <span class="tag">v3 → v4</span> <span class="version">v1.0 · 2026-06-19</span></h1>
    <div class="subtitle">Paste v3 JSON, click Convert. Site mode shows Pages / Header / Footer in 3 separate boxes.</div>
  </div>
  <div id="status" data-type="loading">Loading Python runtime…</div>
</header>

<main>
  <div class="toolbar">
    <label>Mode
      <select id="mode">
        <option value="auto">Auto-detect</option>
        <option value="sections">Sections</option>
        <option value="page">Page</option>
        <option value="pages">Pages (array)</option>
        <option value="site">Site (pages + zones)</option>
        <option value="zones">Zones only</option>
      </select>
    </label>
    <button id="convert" class="primary" disabled title="กำลังโหลด Python runtime… กรุณารอสักครู่">Convert →</button>
    <button id="clear" class="ghost" type="button">Clear</button>
  </div>

  <div class="content-grid">

    <!-- LEFT: input + status/summary -->
    <div class="left-col">
      <section class="panel">
        <header>
          <h2>Input · v3 JSON</h2>
          <span id="inputInfo" class="subtitle" style="color:var(--muted);font-size:12px"></span>
        </header>
        <textarea id="input" spellcheck="false" placeholder='Paste v3 JSON here. Examples:
{"name":"ParagraphSection","props":{...}}
[{"name":"Headline","props":{...}}, {"name":"ParagraphSection","props":{...}}]
{"shop":{...}, "customRoutes":[...]}   ← full site'></textarea>
      </section>

      <div id="statusArea">
        <div id="messages" aria-live="polite"></div>
        <details id="summary" hidden>
          <summary>
            <span class="summary-text" id="summaryText"></span>
            <span class="summary-toggle"></span>
          </summary>
          <div class="summary-tree" id="summaryTree"></div>
        </details>
      </div>
    </div>

    <!-- RIGHT: output (3 stacked boxes) -->
    <div class="right-col">
      <section class="panel" style="flex:1">
        <header>
          <h2>Output · v4 JSON</h2>
        </header>
        <div class="output-scroll">

          <!-- Box 1 · Pages / Output -->
          <div class="output-box" id="boxPages">
            <div class="box-header">
              <h3 id="titlePages">📄 Output</h3>
              <button class="copy-btn primary-action" data-target="outPages" disabled>📋 Copy</button>
            </div>
            <div class="box-picker" id="pickerRow" hidden>
              <label for="pagePicker">หน้า</label>
              <select id="pagePicker"></select>
            </div>
            <textarea id="outPages" readonly spellcheck="false"
                      placeholder="Converted v4 JSON will appear here."></textarea>
          </div>

          <!-- Box 2 · Header -->
          <div class="output-box" id="boxHeader" hidden>
            <div class="box-header">
              <h3 id="titleHeader">🔝 Header</h3>
              <button class="copy-btn primary-action" data-target="outHeader" disabled>📋 Copy</button>
            </div>
            <textarea id="outHeader" readonly spellcheck="false"
                      placeholder="header_zone.children (without wrapping [ ]) — paste into v4 header_zone.children."></textarea>
          </div>

          <!-- Box 3 · Footer -->
          <div class="output-box" id="boxFooter" hidden>
            <div class="box-header">
              <h3 id="titleFooter">🔻 Footer</h3>
              <button class="copy-btn primary-action" data-target="outFooter" disabled>📋 Copy</button>
            </div>
            <textarea id="outFooter" readonly spellcheck="false"
                      placeholder="footer_zone.children (without wrapping [ ]) — paste into v4 footer_zone.children."></textarea>
          </div>

        </div>
      </section>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const messagesEl = $("messages");
  const inputEl  = $("input");
  const modeEl   = $("mode");
  const convertBtn = $("convert");
  const clearBtn   = $("clear");
  const inputInfo  = $("inputInfo");

  const boxPages   = $("boxPages");
  const boxHeader  = $("boxHeader");
  const boxFooter  = $("boxFooter");
  const titlePages  = $("titlePages");
  const titleHeader = $("titleHeader");
  const titleFooter = $("titleFooter");
  const pickerRow  = $("pickerRow");
  const pagePicker = $("pagePicker");
  const outPages   = $("outPages");
  const outHeader  = $("outHeader");
  const outFooter  = $("outFooter");
  const copyButtons = Array.from(document.querySelectorAll(".copy-btn"));

  const summaryEl   = $("summary");
  const summaryText = $("summaryText");
  const summaryTree = $("summaryTree");

  let pyodide = null;
  let pyodideReady = false;
  let state = { pages: [], headerKids: [], footerKids: [] };

  function setStatus(text, type) {
    statusEl.textContent = text;
    statusEl.dataset.type = type || "";
  }
  function logMsg(msg, kind) {
    const line = document.createElement("div");
    line.className = "msg-line msg-" + (kind || "info");
    line.textContent = msg;
    messagesEl.appendChild(line);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  function clearMessages() { messagesEl.innerHTML = ""; }
  function hideSummary() {
    summaryEl.hidden = true;
    summaryEl.open = false;
    summaryText.textContent = "";
    summaryTree.innerHTML = "";
  }
  function showSummary(text, treeHTML) {
    summaryText.textContent = text;
    summaryTree.innerHTML = treeHTML;
    summaryEl.hidden = false;
    summaryEl.open = false;
  }

  function updateCopyButtons() {
    copyButtons.forEach(btn => {
      const target = document.getElementById(btn.dataset.target);
      btn.disabled = !target.value;
    });
  }

  // ── Boot ───────────────────────────────────────────────────────────────
  try {
    setStatus("Loading Python runtime…", "loading");
    pyodide = await loadPyodide();
    setStatus("Fetching converter.py…", "loading");
    const resp = await fetch("converter.py", { cache: "no-cache" });
    if (!resp.ok) throw new Error("Could not fetch converter.py (HTTP " + resp.status + ")");
    const code = await resp.text();
    pyodide.runPython('__name__ = "converter_module"\n' + code);
    pyodideReady = true;
    setStatus("Ready", "ready");
    convertBtn.disabled = false;
    convertBtn.removeAttribute("title");
    logMsg("Python runtime ready. Paste JSON and click Convert.", "info");
  } catch (e) {
    setStatus("Failed to load", "error");
    logMsg("Init failed: " + e.message, "error");
    logMsg("Tip: serve over http(s). For local testing: `python3 -m http.server 8000`.", "warn");
    console.error(e);
    return;
  }

  // ── Lenient JSON parse (mirrors converter.py:_load_json) ───────────────
  function parseInput(raw) {
    raw = raw.trim().replace(/\[\s*\.\.\s*\]/g, "[]");
    if (!raw) throw new Error("Input is empty.");
    try { return JSON.parse(raw); }
    catch (e1) {
      try { return JSON.parse("[" + raw + "]"); }
      catch (e2) { throw new Error("Could not parse JSON: " + e1.message); }
    }
  }

  // ── Auto-detect mode ───────────────────────────────────────────────────
  function detectMode(data) {
    if (Array.isArray(data)) {
      if (data.length && data[0] && typeof data[0] === "object" && "layouts" in data[0]) return "pages";
      return "sections";
    }
    if (data && typeof data === "object") {
      if ("layouts" in data) return "page";
      if ("name" in data && "props" in data) return "sections";
      if ("customRoutes" in data) return "site";
      const looksPagey = Object.values(data).some(v => v && typeof v === "object" && "layouts" in v);
      if (looksPagey) return "site";
    }
    return "sections";
  }

  // ── Run conversion in Python ──────────────────────────────────────────
  async function runConversion(mode, data) {
    pyodide.globals.set("_input", pyodide.toPy(data));
    let snippet;
    if (mode === "site") {
      snippet =
        "_pages = convert_site(_input)\n" +
        "_zones = convert_zones(_input)\n" +
        "_result = {'pages': _pages, **_zones}\n" +
        "_errors = []\n";
    } else if (mode === "zones") {
      snippet = "_result = convert_zones(_input)\n_errors = []\n";
    } else if (mode === "pages") {
      snippet =
        "_result = [convert_page(p) for p in _input if isinstance(p, dict) and 'layouts' in p]\n" +
        "_errors = []\n";
    } else if (mode === "page") {
      snippet = "_result = convert_page(_input)\n_errors = []\n";
    } else {
      snippet =
        "if isinstance(_input, list):\n" +
        "    _result = []\n    _errors = []\n" +
        "    for i, section in enumerate(_input):\n" +
        "        try:\n" +
        "            _result.append(convert_section(section))\n" +
        "        except ValueError as e:\n" +
        "            _errors.append((i, section.get('name', '?'), str(e)))\n" +
        "else:\n" +
        "    _result = convert_section(_input)\n    _errors = []\n";
    }
    pyodide.runPython(snippet);
    const resultProxy = pyodide.globals.get("_result");
    const errorsProxy = pyodide.globals.get("_errors");
    const result = resultProxy.toJs({ dict_converter: Object.fromEntries });
    const errors = errorsProxy.toJs();
    resultProxy.destroy();
    errorsProxy.destroy();
    return { result, errors };
  }

  // ── Page picker ───────────────────────────────────────────────────────
  function renderPagesPane() {
    const sel = pagePicker.value;
    if (!state.pages.length) { outPages.value = ""; return; }
    if (sel === "__all__") {
      outPages.value = JSON.stringify(state.pages, null, 2);
    } else {
      const idx = parseInt(sel, 10);
      if (Number.isInteger(idx) && state.pages[idx]) {
        outPages.value = JSON.stringify(state.pages[idx], null, 2);
      } else {
        outPages.value = JSON.stringify(state.pages, null, 2);
      }
    }
    updateCopyButtons();
  }
  pagePicker.addEventListener("change", renderPagesPane);

  function populatePagePicker(pages) {
    pagePicker.innerHTML = "";
    const allOpt = document.createElement("option");
    allOpt.value = "__all__";
    allOpt.textContent = `📑 ทั้งหมด (${pages.length} pages)`;
    pagePicker.appendChild(allOpt);
    pages.forEach((p, i) => {
      const opt = document.createElement("option");
      opt.value = String(i);
      const secN = ((p.component || {}).children || []).length;
      const path = p.path || "?";
      const nick = p.nickname || "";
      opt.textContent = nick
        ? `${path}  —  ${nick} (${secN} sec)`
        : `${path} (${secN} sec)`;
      pagePicker.appendChild(opt);
    });
    pagePicker.value = "__all__";
  }

  // ── Summary tree builders ─────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }

  function sectionListHTML(v4Sections, v3Sections) {
    return `<ol class="section-list">${
      v4Sections.map((sec, i) => {
        const v3 = v3Sections && v3Sections[i] ? v3Sections[i].name : null;
        const kind = sec.kind || sec.type || "?";
        const nick = sec.nickname || "";
        const v3HTML   = v3 ? `<span class="sec-v3">${esc(v3)}</span> <span class="sec-arrow">→</span> ` : "";
        const kindHTML = `<span class="sec-kind">${esc(kind)}</span>`;
        const nickHTML = nick ? ` <span class="sec-nick">(${esc(nick)})</span>` : "";
        return `<li>${v3HTML}${kindHTML}${nickHTML}</li>`;
      }).join("")
    }</ol>`;
  }

  function pageBlockHTML(page, v3Layouts) {
    const children = ((page.component || {}).children) || [];
    const path = page.path || "?";
    const nick = page.nickname || "";
    const label = nick ? `${path} — ${nick}` : path;
    return `
      <details class="tree-page">
        <summary>${esc(label)} <span class="sec-nick">· ${children.length} sec</span></summary>
        ${sectionListHTML(children, v3Layouts)}
      </details>
    `;
  }

  function buildSummary(mode, result, v3Input) {
    if (mode === "site") {
      const pages = result.pages || [];
      const headerKids = ((result.header_zone || {}).children) || [];
      const footerKids = ((result.footer_zone || {}).children) || [];
      const totalSec = pages.reduce(
        (s, p) => s + (((p.component || {}).children) || []).length, 0
      );
      const text = `✅ site → ${pages.length} pages · ${totalSec} sections · header ${headerKids.length} · footer ${footerKids.length}`;
      const tree =
        `<div class="tree-section">
           <div class="tree-label">📄 Pages (${pages.length})</div>
           ${pages.map(p => pageBlockHTML(p, null)).join("")}
         </div>` +
        (headerKids.length ? `<div class="tree-section">
           <div class="tree-label">🔝 Header zone (${headerKids.length} sec)</div>
           ${sectionListHTML(headerKids, null)}
         </div>` : "") +
        (footerKids.length ? `<div class="tree-section">
           <div class="tree-label">🔻 Footer zone (${footerKids.length} sec)</div>
           ${sectionListHTML(footerKids, null)}
         </div>` : "");
      return { text, tree };
    }
    if (mode === "zones") {
      const headerKids = ((result.header_zone || {}).children) || [];
      const footerKids = ((result.footer_zone || {}).children) || [];
      const text = `✅ zones → header ${headerKids.length} · footer ${footerKids.length}`;
      const tree =
        (headerKids.length ? `<div class="tree-section">
           <div class="tree-label">🔝 Header zone (${headerKids.length} sec)</div>
           ${sectionListHTML(headerKids, null)}
         </div>` : "") +
        (footerKids.length ? `<div class="tree-section">
           <div class="tree-label">🔻 Footer zone (${footerKids.length} sec)</div>
           ${sectionListHTML(footerKids, null)}
         </div>` : "");
      return { text, tree };
    }
    if (mode === "page") {
      const children = ((result.component || {}).children) || [];
      const v3Layouts = (v3Input && v3Input.layouts) || null;
      const text = `✅ page → ${children.length} sections`;
      const tree = `<div class="tree-section">
        <div class="tree-label">📑 Page sections (${children.length})</div>
        ${sectionListHTML(children, v3Layouts)}
      </div>`;
      return { text, tree };
    }
    if (mode === "pages") {
      const items = Array.isArray(result) ? result : [];
      const v3Pages = Array.isArray(v3Input) ? v3Input : [];
      const totalSec = items.reduce(
        (s, p) => s + (((p.component || {}).children) || []).length, 0
      );
      const text = `✅ pages → ${items.length} pages · ${totalSec} sections`;
      const tree = `<div class="tree-section">
        <div class="tree-label">📄 Pages (${items.length})</div>
        ${items.map((p, i) => pageBlockHTML(p, v3Pages[i] && v3Pages[i].layouts)).join("")}
      </div>`;
      return { text, tree };
    }
    // sections
    const items = Array.isArray(result) ? result : [result];
    const v3items = Array.isArray(v3Input) ? v3Input
                    : (v3Input ? [v3Input] : []);
    const text = `✅ sections → ${items.length} section${items.length === 1 ? "" : "s"}`;
    const tree = `<div class="tree-section">
      <div class="tree-label">📑 Sections (${items.length})</div>
      ${sectionListHTML(items, v3items)}
    </div>`;
    return { text, tree };
  }

  // ── Reset / Convert ───────────────────────────────────────────────────
  function resetOutput() {
    outPages.value = "";
    outHeader.value = "";
    outFooter.value = "";
    state = { pages: [], headerKids: [], footerKids: [] };
    pagePicker.innerHTML = "";
    pickerRow.hidden = true;
    boxPages.hidden = false;
    boxHeader.hidden = true;
    boxFooter.hidden = true;
    titlePages.textContent  = "📄 Output";
    titleHeader.textContent = "🔝 Header";
    titleFooter.textContent = "🔻 Footer";
    updateCopyButtons();
    hideSummary();
  }

  async function onConvert() {
    if (!pyodideReady) {
      logMsg("Python runtime is still loading. Please wait a moment.", "warn");
      return;
    }
    clearMessages();
    resetOutput();
    inputInfo.textContent = "";

    let data;
    try {
      data = parseInput(inputEl.value);
    } catch (e) {
      logMsg(e.message, "error");
      return;
    }

    let mode = modeEl.value;
    if (mode === "auto") {
      mode = detectMode(data);
      logMsg("Auto-detected mode: " + mode, "info");
    }

    setStatus("Converting…", "loading");
    convertBtn.disabled = true;
    try {
      const { result, errors } = await runConversion(mode, data);

      if (errors && errors.length) {
        for (const [i, name, msg] of errors) {
          logMsg(`Skipped section ${i} (${name}): ${msg}`, "warn");
        }
      }

      if (mode === "site") {
        const pages = result.pages || [];
        const headerKids = ((result.header_zone || {}).children) || [];
        const footerKids = ((result.footer_zone || {}).children) || [];
        state = { pages, headerKids, footerKids };

        populatePagePicker(pages);
        renderPagesPane();
        outHeader.value = headerKids.map(k => JSON.stringify(k, null, 2)).join(",\n");
        outFooter.value = footerKids.map(k => JSON.stringify(k, null, 2)).join(",\n");

        titlePages.textContent  = `📄 Pages (${pages.length})`;
        titleHeader.textContent = `🔝 Header (${headerKids.length} sec)`;
        titleFooter.textContent = `🔻 Footer (${footerKids.length} sec)`;

        boxPages.hidden  = false;
        boxHeader.hidden = false;
        boxFooter.hidden = false;
        pickerRow.hidden = false;
      } else if (mode === "zones") {
        const headerKids = ((result.header_zone || {}).children) || [];
        const footerKids = ((result.footer_zone || {}).children) || [];
        state = { pages: [], headerKids, footerKids };

        outPages.value  = JSON.stringify(result, null, 2);
        outHeader.value = headerKids.map(k => JSON.stringify(k, null, 2)).join(",\n");
        outFooter.value = footerKids.map(k => JSON.stringify(k, null, 2)).join(",\n");

        titlePages.textContent  = "📦 Full zones JSON";
        titleHeader.textContent = `🔝 Header (${headerKids.length} sec)`;
        titleFooter.textContent = `🔻 Footer (${footerKids.length} sec)`;

        boxPages.hidden  = false;
        boxHeader.hidden = false;
        boxFooter.hidden = false;
        pickerRow.hidden = true;
      } else {
        outPages.value = JSON.stringify(result, null, 2);
        let label = "";
        if (mode === "page") {
          label = `${(((result.component || {}).children) || []).length} section(s)`;
        } else if (mode === "pages") {
          label = `${(Array.isArray(result) ? result.length : 0)} page(s)`;
        } else if (Array.isArray(result)) {
          label = `${result.length} section(s)`;
        } else {
          label = `1 section`;
        }
        titlePages.textContent = `📄 Output · ${label}`;
        boxPages.hidden  = false;
        boxHeader.hidden = true;
        boxFooter.hidden = true;
        pickerRow.hidden = true;
      }

      updateCopyButtons();

      // Build summary tree
      const { text, tree } = buildSummary(mode, result, data);
      showSummary(text, tree);

      setStatus("Ready", "ready");
    } catch (e) {
      logMsg("Conversion failed: " + (e.message || String(e)), "error");
      setStatus("Ready", "ready");
      console.error(e);
    } finally {
      convertBtn.disabled = !pyodideReady;
    }
  }

  // ── Wire up ────────────────────────────────────────────────────────────
  convertBtn.addEventListener("click", onConvert);
  copyButtons.forEach(btn => {
    btn.addEventListener("click", async () => {
      const targetId = btn.dataset.target;
      const target = document.getElementById(targetId);
      try {
        await navigator.clipboard.writeText(target.value);
        const original = btn.textContent;
        btn.textContent = "✓ Copied!";
        setTimeout(() => (btn.textContent = original), 1200);
      } catch (e) {
        logMsg("Copy failed: " + e.message, "error");
      }
    });
  });
  clearBtn.addEventListener("click", () => {
    inputEl.value = "";
    resetOutput();
    clearMessages();
    inputInfo.textContent = "";
    inputEl.focus();
  });

  inputEl.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
      e.preventDefault();
      if (!convertBtn.disabled) onConvert();
    }
  });
  inputEl.addEventListener("input", () => {
    const len = inputEl.value.length;
    inputInfo.textContent = len ? `${len.toLocaleString()} chars` : "";
  });
})();
</script>

</body>
</html>
