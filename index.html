<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>converter2v4 — LNW Shop v3 → v4</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3248;
    --text: #e2e8f0;
    --muted: #8892a4;
    --accent: #6366f1;
    --accent2: #818cf8;
    --green: #22c55e;
    --yellow: #f59e0b;
    --red: #ef4444;
    --blue: #38bdf8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header.app {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  header.app h1 {
    margin: 0;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  header.app h1 span.tag {
    background: var(--accent);
    color: white;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    margin-left: 8px;
    font-weight: 500;
  }
  header.app .subtitle {
    color: var(--muted);
    font-size: 13px;
  }
  #status {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  #status[data-type="loading"] { color: var(--blue); border-color: rgba(56,189,248,0.4); }
  #status[data-type="ready"]   { color: var(--green); border-color: rgba(34,197,94,0.4); }
  #status[data-type="error"]   { color: var(--red);   border-color: rgba(239,68,68,0.4); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 16px 24px;
    gap: 12px;
    min-height: 0;
  }

  .toolbar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
  }
  select, button {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 7px 12px;
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  select:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
  button.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.primary:hover:not(:disabled) { background: var(--accent2); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.ghost { background: transparent; }

  .panels {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    min-height: 360px;
  }
  @media (max-width: 900px) {
    .panels { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  .panel header {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .panel header h2 {
    margin: 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .panel textarea {
    flex: 1;
    width: 100%;
    border: 0;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    resize: none;
    outline: none;
    white-space: pre;
    overflow: auto;
  }
  .panel textarea::placeholder { color: var(--muted); }

  /* ── Tabs (output panel) ─────────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 6px 8px 0;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    background: transparent;
    border: 1px solid transparent;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
  }
  .tab:hover:not(.active):not(:disabled) { color: var(--text); }
  .tab.active {
    background: var(--bg);
    border-color: var(--border);
    color: var(--text);
    margin-bottom: -1px;
    font-weight: 600;
  }
  .tab[hidden] { display: none; }
  .picker-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
  }
  .picker-row select { flex: 1; min-width: 0; }
  .tab-pane[hidden] { display: none !important; }

  #log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    max-height: 140px;
    overflow: auto;
    font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Monaco, Consolas, monospace;
    font-size: 12px;
    line-height: 1.6;
  }
  #log:empty { display: none; }
  .log-line { padding: 1px 0; }
  .log-info  { color: var(--muted); }
  .log-ok    { color: var(--green); }
  .log-warn  { color: var(--yellow); }
  .log-error { color: var(--red); }
</style>
</head>
<body>

<header class="app">
  <div>
    <h1>converter2v4 <span class="tag">v3 → v4</span></h1>
    <div class="subtitle">Paste v3 JSON, click Convert. Site mode splits output into Pages / Header / Footer.</div>
  </div>
  <div id="status" data-type="loading">Loading Python runtime…</div>
</header>

<main>
  <div class="toolbar">
    <label>Mode
      <select id="mode">
        <option value="auto">Auto-detect</option>
        <option value="sections">Sections</option>
        <option value="page">Page</option>
        <option value="pages">Pages (array)</option>
        <option value="site">Site (pages + zones)</option>
        <option value="zones">Zones only</option>
      </select>
    </label>
    <button id="convert" class="primary" disabled>Convert →</button>
    <button id="clear" class="ghost" type="button">Clear</button>
  </div>

  <div class="panels">
    <section class="panel">
      <header>
        <h2>Input · v3 JSON</h2>
        <span id="inputInfo" class="subtitle" style="color:var(--muted);font-size:12px"></span>
      </header>
      <textarea id="input" spellcheck="false" placeholder='Paste v3 JSON here. Examples:
{"name":"ParagraphSection","props":{...}}
[{"name":"Headline","props":{...}}, {"name":"ParagraphSection","props":{...}}]
{"shop":{...}, "customRoutes":[...]}   ← full site'></textarea>
    </section>

    <section class="panel">
      <header>
        <h2>Output · v4 JSON</h2>
        <button id="copy" disabled>Copy current tab</button>
      </header>
      <div class="tabs" role="tablist">
        <button type="button" class="tab active" data-tab="pages" role="tab">📄 Output</button>
        <button type="button" class="tab" data-tab="header" role="tab" hidden>🔝 Header</button>
        <button type="button" class="tab" data-tab="footer" role="tab" hidden>🔻 Footer</button>
      </div>
      <div class="picker-row" id="pickerRow" hidden>
        <label for="pagePicker">หน้า</label>
        <select id="pagePicker"></select>
      </div>
      <textarea id="outPages" class="tab-pane" data-tab="pages" readonly spellcheck="false"
                placeholder="Converted v4 JSON will appear here."></textarea>
      <textarea id="outHeader" class="tab-pane" data-tab="header" readonly spellcheck="false"
                placeholder="header_zone.children (without wrapping [ ]) — paste into v4 header_zone.children." hidden></textarea>
      <textarea id="outFooter" class="tab-pane" data-tab="footer" readonly spellcheck="false"
                placeholder="footer_zone.children (without wrapping [ ]) — paste into v4 footer_zone.children." hidden></textarea>
    </section>
  </div>

  <div id="log" aria-live="polite"></div>
</main>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const statusEl = $("status");
  const logEl    = $("log");
  const inputEl  = $("input");
  const modeEl   = $("mode");
  const convertBtn = $("convert");
  const copyBtn    = $("copy");
  const clearBtn   = $("clear");
  const inputInfo  = $("inputInfo");

  const tabsEl     = document.querySelector(".tabs");
  const tabButtons = Array.from(document.querySelectorAll(".tab"));
  const pickerRow  = $("pickerRow");
  const pagePicker = $("pagePicker");
  const outPages   = $("outPages");
  const outHeader  = $("outHeader");
  const outFooter  = $("outFooter");
  const panes = { pages: outPages, header: outHeader, footer: outFooter };

  let pyodide = null;
  let activeTab = "pages";
  // Cached state from the last conversion (site mode)
  let state = { pages: [], headerKids: [], footerKids: [] };

  function setStatus(text, type) {
    statusEl.textContent = text;
    statusEl.dataset.type = type || "";
  }
  function logLine(msg, kind) {
    const line = document.createElement("div");
    line.className = "log-line log-" + (kind || "info");
    line.textContent = msg;
    logEl.appendChild(line);
    logEl.scrollTop = logEl.scrollHeight;
  }
  function clearLog() { logEl.innerHTML = ""; }

  function setTabTitle(tab, label) {
    const btn = tabButtons.find(b => b.dataset.tab === tab);
    if (btn) btn.textContent = label;
  }
  function showTab(tab, visible) {
    const btn = tabButtons.find(b => b.dataset.tab === tab);
    if (btn) btn.hidden = !visible;
  }
  function activateTab(tab) {
    activeTab = tab;
    tabButtons.forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
    Object.entries(panes).forEach(([k, el]) => { el.hidden = (k !== tab); });
    pickerRow.hidden = !(tab === "pages" && state.pages.length > 0);
  }
  tabsEl.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab");
    if (!btn || btn.hidden) return;
    activateTab(btn.dataset.tab);
  });

  // ── Boot ───────────────────────────────────────────────────────────────
  try {
    setStatus("Loading Python runtime…", "loading");
    pyodide = await loadPyodide();
    setStatus("Fetching converter.py…", "loading");
    const resp = await fetch("converter.py", { cache: "no-cache" });
    if (!resp.ok) throw new Error("Could not fetch converter.py (HTTP " + resp.status + ")");
    const code = await resp.text();
    pyodide.runPython('__name__ = "converter_module"\n' + code);
    setStatus("Ready", "ready");
    convertBtn.disabled = false;
    logLine("Python runtime ready. Paste JSON and click Convert.", "info");
  } catch (e) {
    setStatus("Failed to load", "error");
    logLine("Init failed: " + e.message, "error");
    logLine("Tip: serve over http(s). For local testing: `python3 -m http.server 8000`.", "warn");
    console.error(e);
    return;
  }

  // ── Lenient JSON parse (mirrors converter.py:_load_json) ───────────────
  function parseInput(raw) {
    raw = raw.trim().replace(/\[\s*\.\.\s*\]/g, "[]");
    if (!raw) throw new Error("Input is empty.");
    try { return JSON.parse(raw); }
    catch (e1) {
      try { return JSON.parse("[" + raw + "]"); }
      catch (e2) { throw new Error("Could not parse JSON: " + e1.message); }
    }
  }

  // ── Auto-detect mode (mirrors converter.py:_detect_mode) ───────────────
  function detectMode(data) {
    if (Array.isArray(data)) {
      if (data.length && data[0] && typeof data[0] === "object" && "layouts" in data[0]) return "pages";
      return "sections";
    }
    if (data && typeof data === "object") {
      if ("layouts" in data) return "page";
      if ("name" in data && "props" in data) return "sections";
      if ("customRoutes" in data) return "site";
      const looksPagey = Object.values(data).some(v => v && typeof v === "object" && "layouts" in v);
      if (looksPagey) return "site";
    }
    return "sections";
  }

  // ── Run conversion in Python ──────────────────────────────────────────
  async function runConversion(mode, data) {
    pyodide.globals.set("_input", pyodide.toPy(data));
    let snippet;
    if (mode === "site") {
      snippet =
        "_pages = convert_site(_input)\n" +
        "_zones = convert_zones(_input)\n" +
        "_result = {'pages': _pages, **_zones}\n" +
        "_errors = []\n";
    } else if (mode === "zones") {
      snippet = "_result = convert_zones(_input)\n_errors = []\n";
    } else if (mode === "pages") {
      snippet =
        "_result = [convert_page(p) for p in _input if isinstance(p, dict) and 'layouts' in p]\n" +
        "_errors = []\n";
    } else if (mode === "page") {
      snippet = "_result = convert_page(_input)\n_errors = []\n";
    } else {
      snippet =
        "if isinstance(_input, list):\n" +
        "    _result = []\n    _errors = []\n" +
        "    for i, section in enumerate(_input):\n" +
        "        try:\n" +
        "            _result.append(convert_section(section))\n" +
        "        except ValueError as e:\n" +
        "            _errors.append((i, section.get('name', '?'), str(e)))\n" +
        "else:\n" +
        "    _result = convert_section(_input)\n    _errors = []\n";
    }
    pyodide.runPython(snippet);
    const resultProxy = pyodide.globals.get("_result");
    const errorsProxy = pyodide.globals.get("_errors");
    const result = resultProxy.toJs({ dict_converter: Object.fromEntries });
    const errors = errorsProxy.toJs();
    resultProxy.destroy();
    errorsProxy.destroy();
    return { result, errors };
  }

  // ── Page picker render ────────────────────────────────────────────────
  function renderPagesPane() {
    const sel = pagePicker.value;
    if (!state.pages.length) { outPages.value = ""; return; }
    if (sel === "__all__") {
      outPages.value = JSON.stringify(state.pages, null, 2);
    } else {
      const idx = parseInt(sel, 10);
      if (Number.isInteger(idx) && state.pages[idx]) {
        outPages.value = JSON.stringify(state.pages[idx], null, 2);
      } else {
        outPages.value = JSON.stringify(state.pages, null, 2);
      }
    }
  }
  pagePicker.addEventListener("change", renderPagesPane);

  function populatePagePicker(pages) {
    pagePicker.innerHTML = "";
    const allOpt = document.createElement("option");
    allOpt.value = "__all__";
    allOpt.textContent = `📑 ทั้งหมด (${pages.length} pages)`;
    pagePicker.appendChild(allOpt);
    pages.forEach((p, i) => {
      const opt = document.createElement("option");
      opt.value = String(i);
      const secN = ((p.component || {}).children || []).length;
      const path = p.path || "?";
      const nick = p.nickname || "";
      opt.textContent = nick
        ? `${path}  —  ${nick} (${secN} sec)`
        : `${path} (${secN} sec)`;
      pagePicker.appendChild(opt);
    });
    pagePicker.value = "__all__";
  }

  function resetOutput() {
    outPages.value = "";
    outHeader.value = "";
    outFooter.value = "";
    state = { pages: [], headerKids: [], footerKids: [] };
    pagePicker.innerHTML = "";
    pickerRow.hidden = true;
    showTab("header", false);
    showTab("footer", false);
    setTabTitle("pages", "📄 Output");
    activateTab("pages");
    copyBtn.disabled = true;
  }

  async function onConvert() {
    clearLog();
    resetOutput();
    inputInfo.textContent = "";

    let data;
    try {
      data = parseInput(inputEl.value);
    } catch (e) {
      logLine(e.message, "error");
      return;
    }

    let mode = modeEl.value;
    if (mode === "auto") {
      mode = detectMode(data);
      logLine("Auto-detected mode: " + mode, "info");
    }

    setStatus("Converting…", "loading");
    convertBtn.disabled = true;
    try {
      const { result, errors } = await runConversion(mode, data);

      if (errors && errors.length) {
        for (const [i, name, msg] of errors) {
          logLine(`Skipped section ${i} (${name}): ${msg}`, "warn");
        }
      }

      if (mode === "site") {
        // result = { pages: [...], header_zone: {...}|null, footer_zone: {...}|null, free_zone: null }
        const pages = result.pages || [];
        const headerKids = ((result.header_zone || {}).children) || [];
        const footerKids = ((result.footer_zone || {}).children) || [];
        state = { pages, headerKids, footerKids };

        populatePagePicker(pages);
        renderPagesPane();

        // Header/Footer panes show children comma-joined, NO wrapping [ ]
        outHeader.value = headerKids
          .map(k => JSON.stringify(k, null, 2))
          .join(",\n");
        outFooter.value = footerKids
          .map(k => JSON.stringify(k, null, 2))
          .join(",\n");

        setTabTitle("pages", `📄 Pages (${pages.length})`);
        setTabTitle("header", `🔝 Header (${headerKids.length} sec)`);
        setTabTitle("footer", `🔻 Footer (${footerKids.length} sec)`);
        showTab("header", true);
        showTab("footer", true);
        pickerRow.hidden = false;
        activateTab("pages");

        const totalSec = pages.reduce(
          (sum, p) => sum + (((p.component || {}).children) || []).length, 0
        );
        logLine(
          `Done. site → ${pages.length} pages · ${totalSec} sections · header ${headerKids.length} · footer ${footerKids.length}`,
          "ok"
        );
      } else if (mode === "zones") {
        const headerKids = ((result.header_zone || {}).children) || [];
        const footerKids = ((result.footer_zone || {}).children) || [];
        state = { pages: [], headerKids, footerKids };

        outPages.value = JSON.stringify(result, null, 2);
        outHeader.value = headerKids.map(k => JSON.stringify(k, null, 2)).join(",\n");
        outFooter.value = footerKids.map(k => JSON.stringify(k, null, 2)).join(",\n");

        setTabTitle("pages", "📄 Output (zones JSON)");
        setTabTitle("header", `🔝 Header (${headerKids.length} sec)`);
        setTabTitle("footer", `🔻 Footer (${footerKids.length} sec)`);
        showTab("header", true);
        showTab("footer", true);
        pickerRow.hidden = true;
        activateTab("pages");
        logLine(`Done. zones → header ${headerKids.length} · footer ${footerKids.length}`, "ok");
      } else {
        // sections / page / pages → single output box
        outPages.value = JSON.stringify(result, null, 2);
        let label = "";
        if (mode === "page") {
          label = `${(((result.component || {}).children) || []).length} section(s)`;
        } else if (mode === "pages") {
          label = `${(Array.isArray(result) ? result.length : 0)} page(s)`;
        } else if (Array.isArray(result)) {
          label = `${result.length} section(s)`;
        } else {
          label = `1 section`;
        }
        setTabTitle("pages", `📄 Output · ${label}`);
        showTab("header", false);
        showTab("footer", false);
        pickerRow.hidden = true;
        activateTab("pages");
        logLine(`Done. ${mode} → ${label}`, "ok");
      }

      copyBtn.disabled = false;
      setStatus("Ready", "ready");
    } catch (e) {
      logLine("Conversion failed: " + (e.message || String(e)), "error");
      setStatus("Ready", "ready");
      console.error(e);
    } finally {
      convertBtn.disabled = false;
    }
  }

  // ── Wire up ────────────────────────────────────────────────────────────
  convertBtn.addEventListener("click", onConvert);
  copyBtn.addEventListener("click", async () => {
    try {
      const text = panes[activeTab].value;
      await navigator.clipboard.writeText(text);
      const original = copyBtn.textContent;
      copyBtn.textContent = "Copied!";
      setTimeout(() => (copyBtn.textContent = original), 1200);
    } catch (e) {
      logLine("Copy failed: " + e.message, "error");
    }
  });
  clearBtn.addEventListener("click", () => {
    inputEl.value = "";
    resetOutput();
    clearLog();
    inputInfo.textContent = "";
    inputEl.focus();
  });

  inputEl.addEventListener("keydown", (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
      e.preventDefault();
      if (!convertBtn.disabled) onConvert();
    }
  });
  inputEl.addEventListener("input", () => {
    const len = inputEl.value.length;
    inputInfo.textContent = len ? `${len.toLocaleString()} chars` : "";
  });
})();
</script>

</body>
</html>
